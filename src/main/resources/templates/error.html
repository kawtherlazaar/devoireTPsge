<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Erreur</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow p-4">
        <h1 class="text-danger">Erreur</h1>
        <p th:text="${message != null ? message : 'Une erreur est survenue.'}">Une erreur est survenue.</p>
        <div th:if="${error}">
            <p><strong>Status :</strong> <span th:text="${status}">500</span></p>
            <p><strong>Erreur :</strong> <span th:text="${error}"></span></p>
            <p><strong>Chemin :</strong> <span th:text="${path}"></span></p>
        </div>
        <a class="btn btn-primary" th:href="@{/bulletins}">Retour à la liste des bulletins</a>
    </div>
</div>
</body>
</html>
