<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Liste des Étudiants</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body {
            margin: 40px;
            background-color: #f5f5dc; /* beige */
            color: #000;
            font-family: Arial, sans-serif;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 26px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border: 1px solid #000;
            background-color: #fffaf0; /* beige clair */
        }

        thead {
            background-color: #deb887; /* beige brun */
            color: #000;
        }

        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }

        .btn-secondary {
            background-color: #d2b48c; /* beige foncé */
            border: none;
        }

        .btn-secondary:hover {
            background-color: #c19a6b; /* beige plus foncé */
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div th:insert="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">
    <h2>Liste des Étudiants</h2>

    <table class="table table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Email</th>
            <th>Groupe</th>
            <th>Filière</th>
            <th>Moyenne</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="etudiant : ${etudiants}">
            <td th:text="${etudiant.id}"></td>
            <td th:text="${etudiant.nom}"></td>
            <td th:text="${etudiant.prenom}"></td>
            <td th:text="${etudiant.email}"></td>
            <td th:text="${etudiant.groupe}"></td>
            <td th:text="${etudiant.filiere.nom}"></td>
            <td th:text="${#numbers.formatDecimal(etudiant.moyenne, 1, 2)}"></td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary mt-3">Retour</a>
</div>



</body>
</html>
