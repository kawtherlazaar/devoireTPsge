<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Étudiants</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between">

        <h2>Liste des Étudiants</h2>

        <a th:href="@{/etudiants/ajouter}"
           class="btn btn-primary">

            Ajouter

        </a>

    </div>

    <table class="table table-bordered mt-4">

        <thead class="table-dark">

        <tr>

            <th>Nom</th>
            <th>Prénom</th>
            <th>Email</th>
            <th>Groupe</th>
            <th>Moyenne</th>
            <th>Actions</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="e : ${etudiants}">

            <td th:text="${e.nom}"></td>

            <td th:text="${e.prenom}"></td>

            <td th:text="${e.email}"></td>

            <td th:text="${e.groupe}"></td>

            <td th:text="${e.moyenne}"></td>

            <td>

                <a th:href="@{'/etudiants/modifier/' + ${e.id}}"
                   class="btn btn-warning btn-sm">

                    Modifier

                </a>

                <a th:href="@{'/etudiants/supprimer/' + ${e.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirmationSuppression()">

                    Supprimer

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>



<script th:src="@{/js/script.js}"></script>

</body>

</html>
