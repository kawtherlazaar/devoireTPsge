<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Liste des Notes</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            margin: 40px;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div th:insert="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">
    <h2>Liste des Notes</h2>

    <div class="mb-3" sec:authorize="hasRole('ADMIN')">
        <a class="btn btn-primary" th:href="@{/notes/form}">Ajouter une note</a>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Valeur</th>
            <th>Étudiant</th>
            <th>Module</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="note : ${notes}">
            <td th:text="${note.id}"></td>
            <td th:text="${#numbers.formatDecimal(note.valeur, 1, 2)}"></td>
            <td th:text="${note.etudiant.nom + ' ' + note.etudiant.prenom}"></td>
            <td th:text="${note.module.nom}"></td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary mt-3">Retour</a>
</div>

<!-- FOOTER -->
<div th:insert="~{fragments/footer :: footer}"></div>

</body>
</html>
