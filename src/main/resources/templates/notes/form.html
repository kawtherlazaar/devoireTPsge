<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une note</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<div th:insert="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">
    <h2>Ajouter une note</h2>

    <form th:action="@{/notes}" th:object="${note}" method="post">
        <div class="mb-3">
            <label class="form-label">Étudiant</label>
            <select class="form-select" th:field="*{etudiant.id}" required>
                <option th:each="etudiant : ${etudiants}"
                        th:value="${etudiant.id}"
                        th:text="${etudiant.nom + ' ' + etudiant.prenom}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Module</label>
            <select class="form-select" th:field="*{module.id}" required>
                <option th:each="module : ${modules}"
                        th:value="${module.id}"
                        th:text="${module.nom + ' (' + module.coefficient + ')'}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Valeur</label>
            <input type="number" step="0.1" min="0" max="20"
                   class="form-control" th:field="*{valeur}" required>
        </div>

        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a th:href="@{/notes}" class="btn btn-secondary">Annuler</a>
    </form>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>

</body>
</html>
