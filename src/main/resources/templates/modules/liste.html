<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Liste des Modules</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            margin: 40px;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div th:insert="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">
    <h2>Liste des Modules</h2>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Code</th>
            <th>Coefficient</th>
            <th>Filière</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="module : ${modules}">
            <td th:text="${module.id}"></td>
            <td th:text="${module.nom}"></td>
            <td th:text="${module.code}"></td>
            <td th:text="${module.coefficient}"></td>
            <td th:text="${module.filiere.nom}"></td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary mt-3">Retour</a>
</div>

<!-- FOOTER -->
<div th:insert="~{fragments/footer :: footer}"></div>

</body>
</html>
